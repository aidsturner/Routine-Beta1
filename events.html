<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

<body>
  <nav class="navbar">
        <div class="nav-links">
            <a href="profile.html">PROFILE</a>
            <a href="calendar.html">CALENDAR</a>
            <a href="events.html">EVENTS</a>
            <a href="social.html">SOCIAL</a>

    </nav>
    <nav class="notification">
        <div class="notif-bell">
            <img src="bel.png" alt="Notification Bell" width="50" height="50">
        </div>
    </nav>

<main>
    <div class="card">
        <h1>Events</h1>

        <!-- Add Event Form -->
        <div class="add-event">
            <input type="text" id="eventName" placeholder="Event name">
            <input type="date" id="eventDate">
            <input type="time" id="eventTime">
            <button onclick="addEvent()">Add Event</button>
        </div>

        <!-- Events List -->
        <div class="events-list" id="eventsList">
            <div class="event-item">
                <h2>Study Group</h2>
                <p>April 28, 2026 • 3:00 PM</p>
            </div>

            <div class="event-item">
                <h2>Gym Session</h2>
                <p>April 30, 2026 • 6:00 PM</p>
            </div>

            <div class="event-item">
                <h2>Club Meeting</h2>
                <p>May 2, 2026 • 5:30 PM</p>
            </div>
        </div>
    </div>

    <!-- JavaScript -->
    <script>
    function addEvent() {
        const name = document.getElementById("eventName").value;
        const date = document.getElementById("eventDate").value;
        const time = document.getElementById("eventTime").value;

        if (!name || !date || !time) {
            alert("Fill everything out");
            return;
        }

        const eventList = document.getElementById("eventsList");

        const eventItem = document.createElement("div");
        eventItem.classList.add("event-item");

        eventItem.innerHTML = `
            <h2>${name}</h2>
            <p>${date} • ${time}</p>
        `;

        eventList.appendChild(eventItem);

        // clear inputs
        document.getElementById("eventName").value = "";
        document.getElementById("eventDate").value = "";
        document.getElementById("eventTime").value = "";
    }
    </script>
</main>

</body>
